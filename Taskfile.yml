version: "3"

vars:
  APP_NAME: coooooooler
  APP_BUNDLE: '{{.HOME}}/Applications/{{.APP_NAME}}.app'
  APP_CONTENTS_DIR: '{{.APP_BUNDLE}}/Contents'
  APP_MACOS_DIR: '{{.APP_CONTENTS_DIR}}/MacOS'
  APP_PLIST: '{{.APP_CONTENTS_DIR}}/Info.plist'
  LEGACY_INSTALL_DIR: '{{.HOME}}/Applications/AppleSiliconFanControl'
  AUTOSTART_PLIST: '{{.HOME}}/Library/LaunchAgents/com.denisqsound.apple-silicon-fan-control.gui.plist'
  GUI_BIN: '{{.APP_MACOS_DIR}}/{{.APP_NAME}}'
  HELPER_BIN: '{{.APP_MACOS_DIR}}/apple-silicon-fan-control-helper'

tasks:
  dev:
    desc: Launch the debug GUI for manual testing
    cmds:
      - cargo build --bins
      - cargo run --bin apple-silicon-fan-control

  test:
    desc: Run the Rust test suite
    cmds:
      - cargo test

  doctor:
    desc: Print current hardware and fan diagnostics
    cmds:
      - cargo run --bin apple-silicon-fan-control-cli -- doctor

  helper:status:
    desc: Show privileged helper status
    cmds:
      - cargo run --bin apple-silicon-fan-control-cli -- helper status

  install:
    desc: Build release binaries and install app locally
    cmds:
      - cargo build --release --bins
      - rm -rf "{{.LEGACY_INSTALL_DIR}}"
      - mkdir -p "{{.APP_MACOS_DIR}}"
      - |
        cat > "{{.APP_PLIST}}" <<'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>CFBundleDevelopmentRegion</key>
          <string>en</string>
          <key>CFBundleDisplayName</key>
          <string>{{.APP_NAME}}</string>
          <key>CFBundleExecutable</key>
          <string>{{.APP_NAME}}</string>
          <key>CFBundleIdentifier</key>
          <string>com.denisqsound.coooooooler</string>
          <key>CFBundleInfoDictionaryVersion</key>
          <string>6.0</string>
          <key>CFBundleName</key>
          <string>{{.APP_NAME}}</string>
          <key>CFBundlePackageType</key>
          <string>APPL</string>
          <key>CFBundleShortVersionString</key>
          <string>0.1.0</string>
          <key>CFBundleVersion</key>
          <string>0.1.0</string>
          <key>LSMinimumSystemVersion</key>
          <string>13.0</string>
        </dict>
        </plist>
        EOF
      - cp target/release/apple-silicon-fan-control "{{.GUI_BIN}}"
      - cp target/release/apple-silicon-fan-control-helper "{{.HELPER_BIN}}"
      - chmod +x "{{.GUI_BIN}}" "{{.HELPER_BIN}}"
      - echo "Installed to {{.APP_BUNDLE}}"

  autostart:
    desc: Enable app launch at login
    deps: [install]
    cmds:
      - mkdir -p "{{.HOME}}/Library/LaunchAgents"
      - |
        cat > "{{.AUTOSTART_PLIST}}" <<'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>Label</key>
          <string>com.denisqsound.apple-silicon-fan-control.gui</string>
          <key>ProgramArguments</key>
          <array>
            <string>{{.GUI_BIN}}</string>
          </array>
          <key>RunAtLoad</key>
          <true/>
          <key>KeepAlive</key>
          <false/>
          <key>ProcessType</key>
          <string>Interactive</string>
        </dict>
        </plist>
        EOF
      - launchctl unload "{{.AUTOSTART_PLIST}}" 2>/dev/null || true
      - launchctl load "{{.AUTOSTART_PLIST}}"
      - echo "Autostart enabled"

  autostart:off:
    desc: Disable app launch at login
    cmds:
      - launchctl unload "{{.AUTOSTART_PLIST}}" 2>/dev/null || true
      - rm -f "{{.AUTOSTART_PLIST}}"
      - echo "Autostart disabled"

  uninstall:
    desc: Remove installed app files and autostart entry
    cmds:
      - task: autostart:off
      - rm -rf "{{.APP_BUNDLE}}" "{{.LEGACY_INSTALL_DIR}}"
      - echo "App files removed from {{.APP_BUNDLE}}"
